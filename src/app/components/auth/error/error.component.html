<div class="error-wrapper flex align-items-center justify-content-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-column align-items-center justify-content-center">
        <img src="assets/layout/images/logo.png" alt="KitchenBar Logo" class="mb-5 w-10rem flex-shrink-0">
        <div
            style="border-radius:56px; padding:0.3rem; background: linear-gradient(180deg, var(--kb-red) 10%, transparent 30%);">
            <div class="w-full surface-card py-8 px-5 sm:px-8 flex flex-column align-items-center"
                style="border-radius:53px">
                <div class="grid flex flex-column align-items-center">
                    <div class="flex justify-content-center align-items-center bg-red-500 border-circle"
                        style="height:3.2rem; width:3.2rem;">
                        <i class="pi pi-fw pi-exclamation-circle text-2xl text-white"></i>
                    </div>
                    <h1 class="text-900 font-bold text-5xl mb-2">Ha ocurrido un error</h1>
                    <span class="text-600 mb-5">El recurso solicitado no está disponible en este momento.</span>
                    <button pButton pRipple icon="pi pi-arrow-left" label="Ir al Dashboard"
                        class="p-button-brand-primary" [routerLink]="['/']"></button>
                </div>
            </div>
        </div>
    </div>
</div>

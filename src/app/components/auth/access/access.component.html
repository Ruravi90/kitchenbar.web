<div class="access-wrapper flex align-items-center justify-content-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-column align-items-center justify-content-center">
        <img src="assets/layout/images/logo.png" alt="KitchenBar Logo" class="mb-5 w-10rem flex-shrink-0">
        <div
            style="border-radius:56px; padding:0.3rem; background: linear-gradient(180deg, var(--kb-teal) 10%, transparent 30%);">
            <div class="w-full surface-card py-8 px-5 sm:px-8 flex flex-column align-items-center"
                style="border-radius:53px">
                <div class="grid flex flex-column align-items-center">
                    <div class="flex justify-content-center align-items-center bg-teal-500 border-circle"
                        style="width:3.2rem; height:3.2rem;">
                        <i class="text-50 pi pi-fw pi-lock text-2xl"></i>
                    </div>
                    <h1 class="text-900 font-bold text-4xl lg:text-5xl mb-2">Acceso Denegado</h1>
                    <span class="text-600 mb-5">No tienes los permisos necesarios. Por favor contacta al
                        administrador.</span>
                    <button pButton pRipple icon="pi pi-arrow-left" label="Ir al Dashboard"
                        class="p-button-brand-primary" [routerLink]="['/']"></button>
                </div>
            </div>
        </div>
    </div>
</div>
